<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Artha — Indian Stock Analyser</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js" crossorigin="anonymous"></script>
<script src="/static/chartjs-chart-financial.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --border: #2a2d3e;
    --accent: #6c63ff;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #8892a4;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

  /* ── App shell ── */
  .app-body {
    display: grid;
    grid-template-rows: auto 1fr;
    height: 100vh;
    overflow: hidden;
  }

  .topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .topbar h1 { font-size: 1rem; margin: 0; white-space: nowrap; }
  .topbar h1 .accent { color: var(--accent); }
  .topbar .search-wrap { flex: 1; max-width: 480px; position: relative; }

  .scanner-btn {
    margin-left: auto; padding: 6px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted); font-size: 0.8rem; cursor: pointer;
    white-space: nowrap;
  }
  .scanner-btn:hover { color: var(--text); border-color: var(--accent); opacity: 1; }

  .main-split {
    display: flex;
    overflow: hidden;
    min-height: 0;
  }
  .main-split > .left-col { flex: 0 0 56%; min-width: 220px; min-height: 0; overflow: hidden; }
  .main-split > .chat-panel { flex: 1 1 0; min-width: 180px; }

  .resize-handle {
    flex: 0 0 5px;
    background: var(--border);
    cursor: col-resize;
    transition: background 0.15s;
    position: relative;
  }
  .resize-handle:hover, .resize-handle.dragging { background: var(--accent); }
  .resize-handle::after {
    content: '';
    position: absolute; inset: 0 -3px;  /* widen hit-area */
  }

  .stats-empty {
    display: flex; align-items: center; justify-content: center;
    height: 60%; color: var(--muted); font-size: 0.9rem; text-align: center;
  }

  /* Left column: stats on top, news on bottom */
  .left-col {
    display: flex; flex-direction: column;
    min-height: 0; overflow: hidden;
  }
  .stats-panel {
    flex: 1; overflow-y: auto;
    padding: 12px 14px;
    min-height: 0;
  }
  .news-panel {
    flex-shrink: 0;
    height: 210px;
    overflow-y: auto;
    border-top: 1px solid var(--border);
    padding: 8px 14px 10px;
    background: var(--bg);
  }
  .news-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .news-panel-title {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted);
  }
  .news-panel-symbol {
    font-size: 0.72rem; font-weight: 700; color: var(--accent);
  }
  .news-panel-empty {
    display: flex; align-items: center; justify-content: center;
    height: 80%; color: var(--muted); font-size: 0.82rem;
  }
  .news-item-compact {
    display: flex; align-items: flex-start; gap: 7px;
    padding: 5px 0; border-bottom: 1px solid var(--border);
  }
  .news-item-compact:last-child { border-bottom: none; }
  .news-item-compact .news-sent {
    flex-shrink: 0; padding: 2px 5px; border-radius: 3px;
    font-size: 0.6rem; font-weight: 700; text-transform: uppercase; margin-top: 1px;
  }
  .news-item-compact .news-title {
    font-size: 0.79rem; line-height: 1.35;
  }
  .news-item-compact .news-title a { color: var(--text); text-decoration: none; }
  .news-item-compact .news-title a:hover { color: var(--accent); }
  .news-item-compact .news-source {
    font-size: 0.64rem; color: var(--muted); margin-top: 1px;
  }

  .chat-panel {
    display: flex; flex-direction: column;
    border-left: 1px solid var(--border);
    min-height: 0; overflow: hidden;
  }
  .chat-context-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem; color: var(--muted);
    flex-shrink: 0;
  }
  .chat-messages {
    flex: 1; overflow-y: auto;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 10px;
    min-height: 0;
  }
  .chat-input-row {
    display: flex; gap: 8px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-input-row input { flex: 1; padding: 7px 11px; font-size: 0.85rem; }
  .chat-input-row button { padding: 7px 14px; font-size: 0.85rem; }

  /* ── Search ── */
  .search-wrap { position: relative; }
  .search-bar { display: flex; gap: 8px; }
  .search-bar input {
    flex: 1; padding: 8px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 0.88rem; outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--muted); }

  /* Autocomplete */
  .autocomplete {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    z-index: 100; display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .autocomplete.show { display: block; }
  .ac-header {
    padding: 8px 16px; font-size: 0.7rem; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .ac-item {
    padding: 10px 16px; cursor: pointer; display: flex;
    align-items: center; gap: 12px; transition: background 0.15s;
  }
  .ac-item:hover, .ac-item.focused { background: var(--border); }
  .ac-sym { font-weight: 700; font-size: 0.9rem; min-width: 90px; color: var(--accent); }
  .ac-name { font-size: 0.85rem; color: var(--text); flex: 1; }
  .ac-sector { font-size: 0.72rem; color: var(--muted); }

  /* ── Buttons ── */
  button {
    padding: 8px 18px; border-radius: var(--radius);
    border: none; background: var(--accent); color: #fff;
    font-size: 0.88rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s; white-space: nowrap;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.5; cursor: default; }
  button.secondary { background: var(--border); color: var(--text); }

  /* ── Cards (compact) ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px;
  }
  .card-title {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 8px;
  }

  .quote-header { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .quote-symbol { font-size: 1.3rem; font-weight: 800; }
  .quote-price  { font-size: 1.5rem; font-weight: 700; }
  .quote-change { font-size: 0.88rem; padding: 3px 8px; border-radius: 6px; }
  .up   { color: var(--green); background: #052e16; }
  .down { color: var(--red);   background: #2d0a0a; }

  .quote-meta {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 6px; margin-top: 8px;
  }
  .meta-item label { font-size: 0.63rem; color: var(--muted); display: block; margin-bottom: 2px; }
  .meta-item span  { font-size: 0.82rem; font-weight: 600; }

  /* Compact indicators — 2 column */
  .indicators { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .indicator  { background: var(--bg); border-radius: 8px; padding: 8px 10px; }
  .indicator label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .indicator .val  { font-size: 0.9rem; font-weight: 700; margin-top: 4px; }
  .rsi-green { color: var(--green); }
  .rsi-red   { color: var(--red);   }
  .rsi-yellow{ color: var(--yellow);}

  .outlook-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .outlook-card { background: var(--bg); border-radius: 8px; padding: 10px 12px; text-align: center; }
  .outlook-card .timeframe { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .outlook-card .badge {
    display: inline-block; padding: 4px 10px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
  }
  .outlook-card .conf { font-size: 0.75rem; color: var(--muted); }
  .b-strongly_bullish { background: #052e16; color: var(--green); }
  .b-bullish          { background: #0a1f14; color: #4ade80; }
  .b-neutral          { background: #1c1408; color: var(--yellow); }
  .b-bearish          { background: #2d0a0a; color: #f87171; }
  .b-strongly_bearish { background: #450a0a; color: var(--red); }

  .range-bar-wrap { margin-top: 10px; }
  .range-labels   { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .range-track    { height: 8px; background: var(--border); border-radius: 4px; }
  .range-fill     { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #6c63ff, #22c55e); }
  .range-values   { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 600; margin-top: 4px; }

  /* Compact chart */
  .chart-wrap { height: 175px; margin-top: 4px; }
  .chart-controls { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .toggle-group { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .toggle-btn {
    padding: 3px 9px; font-size: 0.72rem; font-weight: 600; background: var(--bg);
    color: var(--muted); border: none; border-right: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .toggle-btn:last-child { border-right: none; }
  .toggle-btn.active { background: var(--accent); color: #fff; }
  .toggle-btn:hover:not(.active) { color: var(--text); }
  .custom-days-wrap { display: none; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); }
  .custom-days-wrap.show { display: flex; }
  .custom-days-wrap input[type=range] { width: 80px; accent-color: var(--accent); }
  .custom-days-wrap input[type=number] {
    width: 44px; padding: 3px 5px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text);
    font-size: 0.75rem; text-align: center;
  }

  .news-list { list-style: none; }
  .news-item {
    padding: 8px 0; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 8px;
  }
  .news-item:last-child { border-bottom: none; }
  .news-sent {
    flex-shrink: 0; padding: 2px 6px; border-radius: 4px;
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
  }
  .sent-positive{ background: #052e16; color: var(--green); }
  .sent-negative{ background: #2d0a0a; color: var(--red);   }
  .sent-neutral { background: #1c1408; color: var(--yellow);}
  .news-title   { font-size: 0.82rem; line-height: 1.4; }
  .news-title a { color: var(--text); text-decoration: none; }
  .news-title a:hover { color: var(--accent); }
  .news-source  { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }

  /* ── Scanner modal ── */
  .scanner-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200; display: none;
    align-items: flex-start; justify-content: center;
    padding-top: 50px;
  }
  .scanner-modal.show { display: flex; }
  .scanner-modal-inner {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius);
    width: min(960px, 95vw); max-height: 82vh;
    overflow-y: auto; padding: 20px; position: relative;
  }
  .modal-close {
    position: absolute; top: 10px; right: 14px;
    background: none; border: none; color: var(--muted);
    font-size: 1.3rem; cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--text); opacity: 1; }

  /* Scanner table */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  thead th {
    text-align: left; padding: 8px 12px; color: var(--muted);
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:hover { background: var(--surface); }
  tbody td { padding: 10px 12px; }
  tbody tr.mover-highlight { background: #0d1f12; }
  tbody tr.mover-highlight:hover { background: #112618; }
  .tbl-symbol { font-weight: 700; cursor: pointer; color: var(--accent); }
  .tbl-symbol:hover { text-decoration: underline; }

  /* ── Chat ── */
  .context-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 10px; background: var(--surface);
    border: 1px solid var(--accent); border-radius: 20px;
    font-size: 0.78rem; font-weight: 600; color: var(--accent);
  }
  .context-chip button {
    padding: 0; background: none; color: var(--muted);
    font-size: 0.85rem; width: 14px; height: 14px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
  }
  .context-chip button:hover { color: var(--red); background: none; opacity: 1; }
  .no-context { font-size: 0.78rem; color: var(--muted); font-style: italic; }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; max-width: 85%; }
  .msg.user  { align-self: flex-end; align-items: flex-end; }
  .msg.artha { align-self: flex-start; align-items: flex-start; }
  .msg-bubble {
    padding: 9px 13px; border-radius: 14px;
    font-size: 0.84rem; line-height: 1.5; white-space: pre-wrap;
  }
  .msg.user  .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg.artha .msg-bubble { background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg-label { font-size: 0.68rem; color: var(--muted); margin-bottom: 3px; }

  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 9px 13px; }
  .typing-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .chat-suggestions { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 0; margin-bottom: 6px; }
  .suggestion {
    padding: 5px 12px; border-radius: 20px; font-size: 0.76rem;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; transition: all 0.15s;
  }
  .suggestion:hover { border-color: var(--accent); color: var(--accent); }

  .chat-input-row input {
    flex: 1; padding: 7px 11px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 0.85rem; outline: none; transition: border-color 0.2s;
  }
  .chat-input-row input:focus { border-color: var(--accent); }
  .chat-input-row input::placeholder { color: var(--muted); }

  /* ── Shared ── */
  .loader { display: none; text-align: center; padding: 32px; color: var(--muted); font-size: 0.88rem; }
  .loader.show { display: block; }
  .spinner {
    width: 30px; height: 30px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    background: #2d0a0a; border: 1px solid #7f1d1d;
    color: #fca5a5; border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 12px; display: none;
  }
  .error-msg.show { display: block; }

  /* ── Exchange badge ── */
  .exchange-badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.5px;
    margin-left: 8px; vertical-align: middle;
  }
  .exchange-nse { background: #0d2847; color: #60a5fa; }
  .exchange-bse { background: #1a0d2e; color: #c084fc; }
  .exchange-unknown { background: var(--border); color: var(--muted); }

  /* ── ML predictions card ── */
  .ml-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .ml-model-box { background: var(--bg); border-radius: 8px; padding: 12px; }
  .ml-model-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .ml-direction { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; }
  .ml-prob-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 0.74rem; }
  .ml-prob-row .prob-label { width: 48px; color: var(--muted); }
  .ml-prob-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .ml-prob-fill-up      { height: 100%; background: var(--green); border-radius: 3px; }
  .ml-prob-fill-down    { height: 100%; background: var(--red);   border-radius: 3px; }
  .ml-prob-fill-neutral { height: 100%; background: var(--yellow);border-radius: 3px; }
  .prob-val { width: 38px; text-align: right; font-weight: 600; }

  /* ── Feature importance chart ── */
  .fi-chart-wrap { height: 200px; margin-top: 8px; }

  /* ── Backtest collapsible ── */
  .collapsible-header {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .toggle-icon { font-size: 0.72rem; color: var(--muted); transition: transform 0.2s; display: inline-block; }
  .toggle-icon.open { transform: rotate(180deg); }
  .collapsible-body { display: none; margin-top: 14px; }
  .collapsible-body.open { display: block; }
  .backtest-metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .bt-metric { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
  .bt-metric label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 3px; }
  .bt-metric .bt-val { font-size: 1.1rem; font-weight: 700; }
  .bt-positive { color: var(--green); }
  .bt-negative { color: var(--red);   }
  .bt-neutral  { color: var(--yellow);}

  @media (max-width: 768px) {
    .main-split { flex-direction: column; }
    .main-split > .left-col { flex: 0 0 50%; min-width: unset; }
    .main-split > .chat-panel { flex: 1 1 0; min-width: unset; }
    .resize-handle { flex: 0 0 5px; cursor: row-resize; }
    .chat-panel { border-left: none; border-top: 1px solid var(--border); }
    .news-panel { height: 160px; }
  }

  /* ── Card drag-to-reorder ── */
  .card-drag-handle {
    cursor: grab; color: var(--muted); font-size: 1rem;
    opacity: 0; transition: opacity 0.15s; margin-left: auto;
    padding: 0 2px; line-height: 1; flex-shrink: 0;
  }
  .card:hover .card-drag-handle { opacity: 1; }
  .card-drag-handle:active { cursor: grabbing; }
  .card.dragging-card { opacity: 0.35; outline: 2px dashed var(--accent); }
  /* card-title needs flex so handle sits on right edge */
  .card > .card-title { display: flex; align-items: center; }

  /* ── News panel resize handle ── */
  .news-resize-handle {
    flex-shrink: 0; height: 5px;
    background: var(--border); cursor: row-resize;
    transition: background 0.15s; position: relative;
  }
  .news-resize-handle:hover, .news-resize-handle.dragging { background: var(--accent); }
  .news-resize-handle::before {
    content: ''; position: absolute; inset: -3px 0; /* wider hit area */
  }

  /* ── Streaming chat bubble ── */
  .msg.streaming .bubble::after {
    content: '▋';
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Fundamentals grid ── */
  .fund-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  }
  .fund-grid > div { display: flex; flex-direction: column; gap: 2px; }
  .fund-grid label { font-size: 0.63rem; color: var(--muted); text-transform: uppercase; }
  .fund-grid span  { font-size: 0.85rem; font-weight: 600; }

  /* ── Consensus banner ── */
  .consensus-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 8px;
    font-size: 0.8rem; margin-bottom: 10px;
  }
  .consensus-agree    { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
  .consensus-conflict { background: rgba(234,179,8,0.1);  border: 1px solid rgba(234,179,8,0.35); color: #facc15; }
  .consensus-icon { font-size: 1rem; }
  .consensus-conf { margin-left: auto; color: var(--muted); }
</style>
</head>
<body>

<div class="app-body">

  <!-- Compact topbar -->
  <div class="topbar">
    <h1><span class="accent">Artha</span> <small style="font-size:0.7rem;color:var(--muted)">अर्थ</small></h1>
    <div class="search-wrap">
      <div class="search-bar">
        <input id="sym-input" type="text" autocomplete="off"
               placeholder="Search symbol, name, sector…"
               oninput="onSearchInput(this.value)"
               onkeydown="onSearchKey(event)" />
        <button onclick="analyseFromSearch()" id="analyse-btn">Analyse</button>
      </div>
      <div id="autocomplete" class="autocomplete"></div>
    </div>
    <button class="scanner-btn" onclick="openScanner()">⊞ Scanner</button>
  </div>

  <!-- Main split pane -->
  <div class="main-split">

    <!-- Left column: stats (top) + news (bottom) -->
    <div class="left-col">

      <div class="stats-panel" id="stats-panel">
        <div id="analyse-error" class="error-msg"></div>
        <div id="analyse-loader" class="loader"><div class="spinner"></div>Fetching data…</div>
        <div id="analyse-result"></div>
        <div id="stats-empty" class="stats-empty">
          <div>
            <p style="font-size:1.4rem;margin-bottom:8px">📊</p>
            <p>Search for a stock above,<br>or ask Artha in the chat →</p>
          </div>
        </div>
      </div>

      <!-- News panel resize handle -->
      <div class="news-resize-handle" id="news-resize-handle"></div>

      <!-- News panel -->
      <div class="news-panel" id="news-panel">
        <div class="news-panel-header">
          <span class="news-panel-title">Latest News</span>
          <span class="news-panel-symbol" id="news-panel-symbol"></span>
        </div>
        <div id="news-panel-content">
          <div class="news-panel-empty">Search for a stock to see headlines</div>
        </div>
      </div>

    </div><!-- .left-col -->

    <div class="resize-handle" id="resize-handle"></div>

    <!-- Right: chat panel (always visible) -->
    <div class="chat-panel">
      <div class="chat-context-bar">
        <span>Context:</span>
        <div id="chat-context-display">
          <span class="no-context">none</span>
        </div>
        <button class="secondary" onclick="clearChat()"
                style="margin-left:auto;padding:3px 10px;font-size:0.73rem">Clear</button>
      </div>
      <div class="chat-messages" id="chat-messages">
        <div id="chat-empty">
          <p style="color:var(--muted);font-size:0.82rem;padding:6px 0">
            Ask Artha about any Indian stock…
          </p>
          <div class="chat-suggestions" id="chat-suggestions">
            <span class="suggestion" onclick="sendSuggestion(this)">Analyse RELIANCE</span>
            <span class="suggestion" onclick="sendSuggestion(this)">What does RSI tell me?</span>
            <span class="suggestion" onclick="sendSuggestion(this)">Best PSU stocks now?</span>
            <span class="suggestion" onclick="sendSuggestion(this)">Explain MACD histogram</span>
          </div>
        </div>
      </div>
      <div class="chat-input-row">
        <input id="chat-input" type="text"
               placeholder="Ask about a stock…"
               onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}" />
        <button onclick="sendChat()" id="chat-send-btn">Send</button>
      </div>
    </div>

  </div><!-- .main-split -->

</div><!-- .app-body -->

<!-- Scanner modal -->
<div class="scanner-modal" id="scanner-modal" onclick="closeScannerModal(event)">
  <div class="scanner-modal-inner">
    <button class="modal-close" onclick="closeScannerModal()">×</button>
    <div style="font-size:1rem;font-weight:700;margin-bottom:14px">⊞ Nifty 50 Scanner</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <button onclick="runScan()" id="scan-btn">Run Scan</button>
      <span id="scan-status" style="font-size:0.8rem;color:var(--muted)"></span>
      <span id="scan-loader" style="display:none">
        <div class="spinner" style="width:18px;height:18px;border-width:2px;margin:0;display:inline-block;vertical-align:middle"></div>
      </span>
    </div>
    <div id="scan-error" class="error-msg"></div>
    <div id="scan-result"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   State
══════════════════════════════════════════════ */
let currentSymbol   = '';
let fiChart         = null;
let chatHistory     = [];
let acResults       = [];
let acFocusIdx      = -1;
let acDebounce      = null;
let sparkChart      = null;
let currentHistory  = [];
let activeRange     = '1M';
let activeDays      = 30;
let activeChartType = 'line';

/* ══════════════════════════════════════════════
   News Panel
══════════════════════════════════════════════ */
function renderNewsPanel(symbol, articles) {
  const symbolEl  = document.getElementById('news-panel-symbol');
  const contentEl = document.getElementById('news-panel-content');
  if (!contentEl) return;

  if (symbolEl) symbolEl.textContent = symbol || '';

  if (!articles || !articles.length) {
    contentEl.innerHTML = '<div class="news-panel-empty">No recent news found</div>';
    return;
  }

  contentEl.innerHTML = articles.map(a => {
    const sentCls = a.sentiment === 'positive' ? 'sent-positive'
                  : a.sentiment === 'negative' ? 'sent-negative' : 'sent-neutral';
    const src = [a.source, a.published ? a.published.slice(0,10) : ''].filter(Boolean).join(' · ');
    return `<div class="news-item-compact">
      <span class="news-sent ${sentCls}">${a.sentiment}</span>
      <div>
        <div class="news-title"><a href="${a.link}" target="_blank" rel="noopener">${a.title}</a></div>
        ${src ? `<div class="news-source">${src}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════════
   Scanner Modal
══════════════════════════════════════════════ */
function openScanner() {
  document.getElementById('scanner-modal').classList.add('show');
  if (!document.getElementById('scan-result').innerHTML.trim()) runScan();
}

function closeScannerModal(e) {
  if (!e || e.target === document.getElementById('scanner-modal'))
    document.getElementById('scanner-modal').classList.remove('show');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeScannerModal(); });

/* ══════════════════════════════════════════════
   Helpers
══════════════════════════════════════════════ */
const fmt    = n => n == null ? '—' : '₹' + Number(n).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtPct = n => n == null ? '—' : (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';
const fmtNum = n => n == null ? '—' : Number(n).toLocaleString('en-IN');

function outlookBadge(outlook) {
  const labels = { strongly_bullish:'Strongly Bullish', bullish:'Bullish', neutral:'Neutral', bearish:'Bearish', strongly_bearish:'Strongly Bearish' };
  return `<span class="badge b-${outlook}">${labels[outlook] || outlook}</span>`;
}
function sentimentBadge(s) {
  const cls = s === 'positive' ? 'sent-positive' : s === 'negative' ? 'sent-negative' : 'sent-neutral';
  return `<span class="news-sent ${cls}">${s}</span>`;
}
function rsiClass(rsi) {
  if (rsi <= 30) return 'rsi-green';
  if (rsi >= 70) return 'rsi-red';
  return 'rsi-yellow';
}

/* ══════════════════════════════════════════════
   Autocomplete
══════════════════════════════════════════════ */
function onSearchInput(val) {
  clearTimeout(acDebounce);
  if (val.trim().length < 2) { hideAC(); return; }
  acDebounce = setTimeout(() => fetchAC(val.trim()), 280);
}

async function fetchAC(q) {
  try {
    const res  = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    acResults  = data.results || [];
    acFocusIdx = -1;
    renderAC(data);
  } catch { hideAC(); }
}

function renderAC(data) {
  const el = document.getElementById('autocomplete');
  if (!acResults.length) { hideAC(); return; }

  const isGroup   = data.type === 'list';
  const groupName = data.group ? ` — ${data.group}` : '';
  const headerTxt = isGroup
    ? `${data.match_type === 'index' ? 'Index' : 'Sector'} match${groupName} (${acResults.length} stocks)`
    : (data.match_type === 'fuzzy' ? 'Did you mean…'
       : data.match_type === 'direct' ? 'Analyse directly (NSE / BSE auto-detect)'
       : 'Match found');

  const items = acResults.slice(0, isGroup ? 8 : 6).map((r, i) => `
    <div class="ac-item" data-idx="${i}" onmousedown="selectAC(${i})">
      <span class="ac-sym">${r.symbol}</span>
      <span class="ac-name">${data.match_type === 'direct' ? 'NSE / BSE auto-detect' : r.name}</span>
      <span class="ac-sector">${r.sector}</span>
    </div>`).join('');

  const more = acResults.length > 8 ? `<div class="ac-header" style="border-top:1px solid var(--border)">+${acResults.length - 8} more…</div>` : '';

  el.innerHTML = `<div class="ac-header">${headerTxt}</div>${items}${more}`;
  el.classList.add('show');
}

function hideAC() {
  document.getElementById('autocomplete').classList.remove('show');
  acResults = []; acFocusIdx = -1;
}

function selectAC(idx) {
  const r = acResults[idx];
  if (!r) return;
  document.getElementById('sym-input').value = r.symbol;
  hideAC();
  analyseStock(r.symbol);
}

function onSearchKey(e) {
  const ac    = document.getElementById('autocomplete');
  const items = ac.querySelectorAll('.ac-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acFocusIdx = Math.min(acFocusIdx + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acFocusIdx = Math.max(acFocusIdx - 1, -1);
    items.forEach((el, i) => el.classList.toggle('focused', i === acFocusIdx));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acFocusIdx >= 0 && acResults[acFocusIdx]) {
      selectAC(acFocusIdx);
    } else {
      analyseFromSearch();
    }
  } else if (e.key === 'Escape') {
    hideAC();
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) hideAC();
});

/* ══════════════════════════════════════════════
   Analyse
══════════════════════════════════════════════ */
async function analyseFromSearch() {
  const raw = document.getElementById('sym-input').value.trim();
  if (!raw) return;
  hideAC();

  try {
    const res  = await fetch(`/api/search?q=${encodeURIComponent(raw)}`);
    const data = await res.json();
    if (data.type === 'single' && data.results.length) {
      analyseStock(data.results[0].symbol);
      return;
    } else if (data.type === 'list' && data.results.length) {
      showGroupPicker(data);
      return;
    }
  } catch {}

  analyseStock(raw.toUpperCase());
}

function showGroupPicker(data) {
  const result = document.getElementById('analyse-result');
  const stocks = data.results;
  const label  = data.group || data.match_type;
  const rows   = stocks.map(s => `
    <div class="ac-item" style="cursor:pointer;border-bottom:1px solid var(--border)"
         onclick="document.getElementById('sym-input').value='${s.symbol}'; analyseStock('${s.symbol}')">
      <span class="ac-sym">${s.symbol}</span>
      <span class="ac-name">${s.name}</span>
      <span class="ac-sector">${s.sector}</span>
    </div>`).join('');

  result.innerHTML = `
    <div class="card">
      <div class="card-title">Select a stock — ${label}</div>
      ${rows}
    </div>`;

  const empty = document.getElementById('stats-empty');
  if (empty) empty.remove();
}

async function analyseStock(symbol) {
  symbol = (symbol || document.getElementById('sym-input').value.trim()).toUpperCase();
  if (!symbol) return;

  const btn    = document.getElementById('analyse-btn');
  const loader = document.getElementById('analyse-loader');
  const errEl  = document.getElementById('analyse-error');
  const result = document.getElementById('analyse-result');

  btn.disabled = true;
  loader.classList.add('show');
  errEl.classList.remove('show');
  result.innerHTML = '';
  if (sparkChart) { sparkChart.destroy(); sparkChart = null; }
  if (fiChart)    { fiChart.destroy();    fiChart    = null; }

  try {
    const res  = await fetch(`/api/analyse/${symbol}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Unknown error');
    renderAnalysis(data);
    setContext(symbol);
    const empty = document.getElementById('stats-empty');
    if (empty) empty.remove();
  } catch (e) {
    errEl.textContent = `Error: ${e.message}`;
    errEl.classList.add('show');
  } finally {
    btn.disabled = false;
    loader.classList.remove('show');
  }
}

function renderAnalysis(d) {
  const q   = d.quote || {};
  const pred = d.prediction || {};
  const out  = d.outlook || {};
  const news = d.news || {};
  const ti   = pred.technical_indicators || {};
  const ecr  = pred.expected_close_range || {};

  const exCls   = d.exchange === 'NSE' ? 'exchange-nse' : d.exchange === 'BSE' ? 'exchange-bse' : 'exchange-unknown';
  const exBadge = d.exchange ? `<span class="exchange-badge ${exCls}">${d.exchange}</span>` : '';

  let changeHtml = '';
  if (q.current_price && q.previous_close) {
    const chg = q.current_price - q.previous_close;
    const pct = (chg / q.previous_close) * 100;
    const cls = chg >= 0 ? 'up' : 'down';
    changeHtml = `<span class="quote-change ${cls}">${chg >= 0 ? '+' : ''}${fmtPct(pct)}</span>`;
  }

  let rangeFill = 50;
  if (ecr.low && ecr.high && q.current_price) {
    const span = ecr.high - ecr.low;
    rangeFill  = span > 0 ? Math.min(100, Math.max(0, ((q.current_price - ecr.low) / span) * 100)) : 50;
  }

  document.getElementById('analyse-result').innerHTML = `
  ${renderConsensusBanner(d.consensus)}
  <div class="card" data-card="quote">
    <div class="card-title">Live Quote</div>
    <div class="quote-header">
      <span class="quote-symbol">${d.symbol}${exBadge}</span>
      <span class="quote-price">${fmt(q.current_price)}</span>
      ${changeHtml}
    </div>
    <div class="quote-meta">
      <div class="meta-item"><label>Day High</label><span>${fmt(q.day_high)}</span></div>
      <div class="meta-item"><label>Day Low</label><span>${fmt(q.day_low)}</span></div>
      <div class="meta-item"><label>Prev Close</label><span>${fmt(q.previous_close)}</span></div>
      <div class="meta-item"><label>Volume</label><span>${fmtNum(q.volume)}</span></div>
      <div class="meta-item"><label>Market Cap</label><span>${q.market_cap ? '₹' + (q.market_cap/1e7).toFixed(0) + ' Cr' : '—'}</span></div>
      <div class="meta-item"><label>52W High</label><span>${fmt(q['52_week_high'])}</span></div>
      <div class="meta-item"><label>52W Low</label><span>${fmt(q['52_week_low'])}</span></div>
    </div>
  </div>

  ${d.history && d.history.length ? `
  <div class="card" data-card="chart">
    <div class="card-title">Price Chart</div>
    <div class="chart-controls">
      <div class="toggle-group" id="range-toggle">
        <button class="toggle-btn active" onclick="setRange('1M')">1M</button>
        <button class="toggle-btn" onclick="setRange('3M')">3M</button>
        <button class="toggle-btn" onclick="setRange('6M')">6M</button>
      </div>
      <div class="custom-days-wrap show" id="custom-days-wrap">
        <span>Days:</span>
        <input type="range" id="days-slider" min="1" max="30" value="30"
               oninput="onDaysSlide(this.value)" />
        <input type="number" id="days-input" min="1" max="30" value="30"
               oninput="onDaysInput(this.value)" />
      </div>
      <div class="toggle-group" id="chart-type-toggle" style="margin-left:auto">
        <button class="toggle-btn active" onclick="setChartType('line')">Line</button>
        <button class="toggle-btn" onclick="setChartType('candle')">Candle</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="sparkline"></canvas></div>
  </div>` : ''}

  <div class="card" data-card="indicators">
    <div class="card-title">Technical Indicators</div>
    <div class="indicators">
      <div class="indicator">
        <label>RSI (14)</label>
        <div class="val ${rsiClass(ti.RSI)}">${ti.RSI != null ? ti.RSI.toFixed(1) : '—'}</div>
      </div>
      <div class="indicator">
        <label>MACD</label>
        <div class="val ${ti.MACD >= 0 ? 'rsi-green' : 'rsi-red'}">${ti.MACD != null ? ti.MACD.toFixed(3) : '—'}</div>
      </div>
      <div class="indicator">
        <label>SMA 5</label>
        <div class="val">${fmt(ti.SMA_5)}</div>
      </div>
      <div class="indicator">
        <label>SMA 20</label>
        <div class="val">${fmt(ti.SMA_20)}</div>
      </div>
    </div>
  </div>

  <div class="card" data-card="outlook">
    <div class="card-title">Outlook</div>
    <div class="outlook-grid">
      ${['short_term_1_3_days','medium_term_1_2_weeks','long_term_1_month'].map((k, i) => {
        const labels = ['Short Term (1–3 days)', 'Medium Term (1–2 wks)', 'Long Term (1 month)'];
        const o = out[k] || {};
        return `<div class="outlook-card">
          <div class="timeframe">${labels[i]}</div>
          ${o.outlook ? outlookBadge(o.outlook) : '<span class="badge b-neutral">—</span>'}
          <div class="conf">${o.confidence != null ? o.confidence.toFixed(1) + '% confidence' : ''}</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  ${ecr.low && ecr.high ? `
  <div class="card" data-card="range">
    <div class="card-title">Expected Close Range (Tomorrow)</div>
    <div class="range-bar-wrap">
      <div class="range-labels"><span>Low</span><span>Current</span><span>High</span></div>
      <div class="range-track"><div class="range-fill" style="width:${rangeFill}%"></div></div>
      <div class="range-values"><span>${fmt(ecr.low)}</span><span>${fmt(pred.current_price)}</span><span>${fmt(ecr.high)}</span></div>
    </div>
  </div>` : ''}

  ${news.articles && news.articles.length ? `
  <div class="card" data-card="news-sentiment">
    <div class="card-title">
      News Sentiment
      <span class="badge b-${news.sentiment_label === 'bullish' ? 'bullish' : news.sentiment_label === 'bearish' ? 'bearish' : 'neutral'}"
            style="margin-left:8px;font-size:0.7rem">${news.sentiment_label}</span>
    </div>
    <ul class="news-list">
      ${news.articles.slice(0, 3).map(a => `
      <li class="news-item">
        ${sentimentBadge(a.sentiment)}
        <div>
          <div class="news-title"><a href="${a.link}" target="_blank">${a.title}</a></div>
          <div class="news-source">${a.source} · ${a.published ? a.published.slice(0,16) : ''}</div>
        </div>
      </li>`).join('')}
    </ul>
  </div>` : ''}

  ${d.ml && !d.ml.error ? renderMLCard(d) : ''}

  ${renderFundamentalsCard(d.fundamentals)}

  <div class="card" id="backtest-card" data-card="backtest">
    <div class="collapsible-header" onclick="toggleBacktest('${d.symbol}')">
      <div class="card-title" style="margin-bottom:0">Walk-Forward Backtest (5-year validation)</div>
      <span class="toggle-icon" id="bt-toggle-icon">▼</span>
    </div>
    <div class="collapsible-body" id="backtest-body">
      <p style="color:var(--muted);font-size:0.82rem;margin-bottom:12px">
        Trains a Random Forest on rolling 252-day windows, predicts 1 day ahead, and validates
        across ~1000 test days. Takes ~60–90 seconds.
      </p>
      <button onclick="loadBacktest('${d.symbol}')" style="padding:6px 16px;font-size:0.8rem">
        Run Backtest
      </button>
      <div id="backtest-result" style="margin-top:16px"></div>
    </div>
  </div>
  `;

  if (d.ml && d.ml.random_forest && d.ml.random_forest.feature_importances) {
    setTimeout(() => renderFeatureImportanceChart(d.ml.random_forest.feature_importances), 50);
  }

  if (d.history && d.history.length) {
    currentHistory  = d.history;
    activeRange     = '1M';
    activeDays      = 30;
    activeChartType = 'line';
    setTimeout(rebuildChart, 50);
  }

  // Always refresh news panel
  renderNewsPanel(d.symbol, (d.news && d.news.articles) ? d.news.articles : []);

  // Enable drag-to-reorder on all cards
  setTimeout(() => initCardDrag(document.getElementById('analyse-result')), 80);
}

/* ══════════════════════════════════════════════
   Chart Controls
══════════════════════════════════════════════ */
function getSlicedHistory() {
  if (!currentHistory.length) return [];
  if (activeRange === '6M') return currentHistory;
  if (activeRange === '3M') return currentHistory.slice(-65);
  return currentHistory.slice(-activeDays);
}

function setRange(range) {
  activeRange = range;
  const wrap = document.getElementById('custom-days-wrap');
  if (wrap) wrap.classList.toggle('show', range === '1M');
  document.querySelectorAll('#range-toggle .toggle-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === range));
  rebuildChart();
}

function onDaysSlide(val) {
  activeDays = parseInt(val, 10);
  const inp = document.getElementById('days-input');
  if (inp) inp.value = activeDays;
  rebuildChart();
}

function onDaysInput(val) {
  let d = parseInt(val, 10);
  if (isNaN(d)) return;
  d = Math.min(30, Math.max(1, d));
  activeDays = d;
  const slider = document.getElementById('days-slider');
  if (slider) slider.value = d;
  rebuildChart();
}

function setChartType(type) {
  activeChartType = type;
  document.querySelectorAll('#chart-type-toggle .toggle-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.toLowerCase() === type));
  rebuildChart();
}

function rebuildChart() {
  // Destroy old instance
  if (sparkChart) { sparkChart.destroy(); sparkChart = null; }

  // Replace canvas node to fully clear Chart.js internal state
  const wrap = document.querySelector('.chart-wrap');
  if (!wrap) return;
  const oldCanvas = document.getElementById('sparkline');
  if (!oldCanvas) return;
  const newCanvas = document.createElement('canvas');
  newCanvas.id = 'sparkline';
  oldCanvas.replaceWith(newCanvas);

  const slice = getSlicedHistory();
  if (!slice.length) return;

  const ctx = newCanvas.getContext('2d');
  const yScale = {
    grid: { color: '#2a2d3e' },
    ticks: { color: '#8892a4', font: { size: 10 },
             callback: v => '₹' + v.toLocaleString('en-IN') }
  };

  if (activeChartType === 'line') {
    const closes = slice.map(h => h.close);
    const labels = slice.map(h => h.date);
    const color  = closes[closes.length - 1] >= closes[0] ? '#22c55e' : '#ef4444';
    sparkChart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets: [{ data: closes, borderColor: color, borderWidth: 2,
        pointRadius: 0, fill: true, backgroundColor: color + '18', tension: 0.3 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { type: 'category', grid: { color: '#2a2d3e' },
               ticks: { color: '#8892a4', maxTicksLimit: 8, font: { size: 10 } } },
          y: yScale
        }
      }
    });
  } else {
    try {
      const candleData = slice.map(h => ({
        x: new Date(h.date).getTime(),
        o: h.open, h: h.high, l: h.low, c: h.close
      }));
      sparkChart = new Chart(ctx, {
        type: 'candlestick',
        data: { datasets: [{ label: 'OHLC', data: candleData,
          color: { up: '#22c55e', down: '#ef4444', unchanged: '#8892a4' } }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { type: 'time', time: { unit: 'day', tooltipFormat: 'dd MMM yy',
                 displayFormats: { day: 'dd MMM' } },
                 grid: { color: '#2a2d3e' },
                 ticks: { color: '#8892a4', maxTicksLimit: 8, font: { size: 10 } } },
            y: yScale
          }
        }
      });
    } catch (err) {
      console.warn('Candlestick chart failed, falling back to line:', err);
      activeChartType = 'line';
      document.querySelectorAll('#chart-type-toggle .toggle-btn').forEach(b =>
        b.classList.toggle('active', b.textContent.toLowerCase() === 'line'));
      rebuildChart();
    }
  }
}

══════════════════════════════════════════════ */
async function runScan() {
  const btn    = document.getElementById('scan-btn');
  const loader = document.getElementById('scan-loader');
  const errEl  = document.getElementById('scan-error');
  const result = document.getElementById('scan-result');
  const status = document.getElementById('scan-status');

  btn.disabled = true;
  loader.style.display = 'inline';
  errEl.classList.remove('show');
  result.innerHTML = '';
  status.textContent = 'Scanning — please wait…';

  try {
    const res  = await fetch('/api/scan');
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Unknown error');
    renderScan(data);
    status.textContent = `Found ${data.total} stocks · ${data.stocks.filter(s => s.max_move_pct >= 3).length} likely to move ≥3%`;
  } catch (e) {
    errEl.textContent = `Error: ${e.message}`;
    errEl.classList.add('show');
    status.textContent = '';
  } finally {
    btn.disabled = false;
    loader.style.display = 'none';
  }
}

function renderScan(data) {
  if (!data.stocks || !data.stocks.length) {
    document.getElementById('scan-result').innerHTML = '<p style="color:var(--muted)">No data returned.</p>';
    return;
  }
  const rows = data.stocks.map(s => {
    const hl        = s.max_move_pct >= 3 ? 'mover-highlight' : '';
    const moveStyle = s.max_move_pct >= 3 ? 'style="color:var(--green);font-weight:700"' : '';
    return `<tr class="${hl}">
      <td class="tbl-symbol" onclick="jumpToAnalyse('${s.symbol}')">${s.symbol}</td>
      <td>${fmt(s.current_price)}</td>
      <td>${fmtPct(s.pct_low)} / ${fmtPct(s.pct_high)}</td>
      <td ${moveStyle}>${s.max_move_pct.toFixed(1)}%</td>
      <td class="${rsiClass(s.rsi)}">${s.rsi != null ? s.rsi.toFixed(1) : '—'}</td>
      <td>${outlookBadge(s.short_outlook)}</td>
      <td>${sentimentBadge(s.news_sentiment)}</td>
    </tr>`;
  }).join('');

  document.getElementById('scan-result').innerHTML = `
  <table>
    <thead><tr>
      <th>Symbol</th><th>Price</th><th>Expected (Low / High)</th>
      <th>Max Move</th><th>RSI</th><th>Short Outlook</th><th>News</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function jumpToAnalyse(symbol) {
  closeScannerModal();
  document.getElementById('sym-input').value = symbol;
  analyseStock(symbol);
}

function appendMsg(role, content) {

  msgs.appendChild(div);

}

function appendTyping() {
  const empty = document.getElementById('chat-empty');
  if (empty) empty.remove();

  const msgs = document.getElementById('chat-messages');
  const div  = document.createElement('div');
  div.className = 'msg artha';
  div.id = 'typing-bubble';
  div.innerHTML = `
    <div class="msg-label">Artha</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const btn   = document.getElementById('chat-send-btn');
  const msg   = input.value.trim();
  if (!msg) return;

  input.value = '';
  btn.disabled = true;
  appendMsg('user', msg);
  chatHistory.push({ role: 'user', content: msg });

  const bubble = appendStreamingBubble();

  const payload = JSON.stringify({
    message: msg,
    context_symbol: currentSymbol,
    history: chatHistory.slice(-10),
  });

  try {
    const url  = '/api/chat/stream?payload=' + encodeURIComponent(payload);
    const resp = await fetch(url);
    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      const errMsg  = errData.detail || `HTTP ${resp.status}`;
      bubble.textContent = 'Error: ' + errMsg;
      bubble.parentElement.classList.remove('streaming');
      if (errMsg.includes('ollama serve') || errMsg.includes('not running')) {
        const msgs = document.getElementById('chat-messages');
        const tip  = document.createElement('div');
        tip.style.cssText = 'color:var(--yellow);font-size:0.78rem;padding:6px 12px;background:#1c1408;border-radius:8px;margin:0 0 6px';
        tip.textContent   = 'Tip: Open a terminal and run: ollama serve';
        msgs.appendChild(tip);
        msgs.scrollTop = msgs.scrollHeight;
      }
      return;
    }

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(6)); } catch { continue; }
        if (evt.type === 'token') {
          bubble.textContent += evt.content;
          bubble.parentElement.scrollTop = bubble.parentElement.scrollHeight;
          document.getElementById('chat-messages').scrollTop =
            document.getElementById('chat-messages').scrollHeight;
        } else if (evt.type === 'done') {
          finaliseStreamBubble(bubble);
          const sym = (evt.symbol_used || '').toUpperCase();
          if (sym) {
            const statsEmpty = !document.getElementById('analyse-result').innerHTML.trim();
            if (sym !== currentSymbol || statsEmpty) analyseStock(sym);
          }
        } else if (evt.type === 'error') {
          bubble.textContent = 'Error: ' + evt.detail;
          bubble.parentElement.classList.remove('streaming');
        }
      }
    }
  } catch (e) {
    bubble.textContent = 'Connection error: ' + e.message;
    bubble.parentElement.classList.remove('streaming');
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

function appendStreamingBubble() {
  const empty = document.getElementById('chat-empty');
  if (empty) empty.remove();

  const msgs = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg artha streaming';
  wrap.innerHTML = '<div class="msg-label">Artha</div>';
  const bub = document.createElement('div');
  bub.className = 'bubble msg-bubble';
  wrap.appendChild(bub);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return bub;
}

function finaliseStreamBubble(bub) {
  bub.parentElement.classList.remove('streaming');
  chatHistory.push({ role: 'assistant', content: bub.textContent });
}

  if (direction === -1) return '<span style="color:var(--red);font-weight:700">▼ DOWN</span>';
  return '<span style="color:var(--yellow);font-weight:700">— NEUTRAL</span>';
}

function mlProbBars(pUp, pDown, pNeutral) {
  const pct = v => Math.round((v || 0) * 100);
  const val = v => ((v || 0) * 100).toFixed(1) + '%';
  return `
    <div class="ml-prob-row">
      <span class="prob-label">Up</span>
      <div class="ml-prob-track"><div class="ml-prob-fill-up" style="width:${pct(pUp)}%"></div></div>
      <span class="prob-val" style="color:var(--green)">${val(pUp)}</span>
    </div>
    <div class="ml-prob-row">
      <span class="prob-label">Neutral</span>
      <div class="ml-prob-track"><div class="ml-prob-fill-neutral" style="width:${pct(pNeutral)}%"></div></div>
      <span class="prob-val" style="color:var(--yellow)">${val(pNeutral)}</span>
    </div>
    <div class="ml-prob-row">
      <span class="prob-label">Down</span>
      <div class="ml-prob-track"><div class="ml-prob-fill-down" style="width:${pct(pDown)}%"></div></div>
      <span class="prob-val" style="color:var(--red)">${val(pDown)}</span>
    </div>`;
}

/* ══════════════════════════════════════════════
   Card drag-to-reorder
══════════════════════════════════════════════ */
function saveCardOrder(container) {
  const order = [...container.querySelectorAll('[data-card]')].map(c => c.dataset.card);
  localStorage.setItem('artha-card-order', JSON.stringify(order));
}

function initCardDrag(container) {
  const cards = [...container.querySelectorAll('[data-card]')];
  if (!cards.length) return;

  // Restore saved order
  const saved = JSON.parse(localStorage.getItem('artha-card-order') || 'null');
  if (saved && Array.isArray(saved)) {
    saved.forEach(name => {
      const el = container.querySelector(`[data-card="${name}"]`);
      if (el) container.appendChild(el);
    });
  }

  let dragSrc = null;

  cards.forEach(card => {
    // Inject grip handle — prefer direct-child .card-title, else collapsible-header
    const titleEl = card.querySelector(':scope > .card-title')
                 || card.querySelector(':scope > .collapsible-header')
                 || card.querySelector('.card-title');
    if (titleEl && !titleEl.querySelector('.card-drag-handle')) {
      const handle = document.createElement('span');
      handle.className = 'card-drag-handle';
      handle.innerHTML = '&#8942;&#8942;'; // grip dots
      handle.title = 'Drag to reorder';
      titleEl.appendChild(handle);

      // Only allow drag when initiated from the handle
      handle.addEventListener('mousedown', () => { card.draggable = true; });
      handle.addEventListener('mouseup',   () => { card.draggable = false; });
      // Prevent handle clicks from triggering collapsible toggles etc.
      handle.addEventListener('click', e => e.stopPropagation());
    }

    card.addEventListener('dragstart', e => {
      dragSrc = card;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', card.dataset.card);
      setTimeout(() => card.classList.add('dragging-card'), 0);
    });

    card.addEventListener('dragend', () => {
      card.draggable = false;
      if (dragSrc) dragSrc.classList.remove('dragging-card');
      dragSrc = null;
      saveCardOrder(container);
    });

    card.addEventListener('dragover', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === card) return;
      const rect = card.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) {
        container.insertBefore(dragSrc, card);
      } else {
        container.insertBefore(dragSrc, card.nextElementSibling);
      }
    });
  });
}

/* ══════════════════════════════════════════════
   News panel vertical resize
══════════════════════════════════════════════ */
(function () {
  const handle = document.getElementById('news-resize-handle');
  const panel  = document.getElementById('news-panel');
  let dragging = false, startY, startH;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startY   = e.clientY;
    startH   = panel.getBoundingClientRect().height;
    handle.classList.add('dragging');
    document.body.style.cursor     = 'row-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    // Dragging up = bigger panel (subtract delta), down = smaller
    const newH = Math.min(Math.max(startH - (e.clientY - startY), 60), 480);
    panel.style.height = newH + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
  });

  // Double-click resets to default height
  handle.addEventListener('dblclick', () => { panel.style.height = '210px'; });
})();

/* ══════════════════════════════════════════════
   Resizable split pane
══════════════════════════════════════════════ */
(function () {
  const handle   = document.getElementById('resize-handle');
  const split    = handle.parentElement;
  const leftCol  = split.querySelector('.left-col');
  let dragging   = false;
  let startX, startW;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX   = e.clientX;
    startW   = leftCol.getBoundingClientRect().width;
    handle.classList.add('dragging');
    document.body.style.cursor    = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const totalW  = split.getBoundingClientRect().width;
    const newW    = Math.min(Math.max(startW + (e.clientX - startX), 220), totalW - 200);
    leftCol.style.flex = `0 0 ${newW}px`;
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
  });

  // Double-click resets to default 56/44 split
  handle.addEventListener('dblclick', () => {
    leftCol.style.flex = '';
  });
})();

/* ══════════════════════════════════════════════
   Init
══════════════════════════════════════════════ */
window.onload = () => document.getElementById('sym-input').focus();
</script>
